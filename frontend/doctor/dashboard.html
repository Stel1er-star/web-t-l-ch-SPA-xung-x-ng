<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trang Chủ Bác Sĩ — SpaProMax</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>
<div id="toast-container"></div>
<div class="main-layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="sidebar-logo-icon">🌿</div><span class="sidebar-logo-text">SpaProMax</span></div>
    <nav class="sidebar-nav">
      <div class="sidebar-section">
        <div class="sidebar-section-title">Làm Việc</div>
        <a href="dashboard.html" class="sidebar-link active"><span class="sidebar-link-icon">📊</span> Tổng Quan</a>
        <a href="appointments.html" class="sidebar-link"><span class="sidebar-link-icon">🗓️</span> Lịch Hẹn</a>
        <a href="schedule.html" class="sidebar-link"><span class="sidebar-link-icon">🕐</span> Lịch Làm Việc</a>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-title">Khác</div>
        <a href="../index.html" class="sidebar-link"><span class="sidebar-link-icon">🌐</span> Trang Chủ</a>
        <a class="sidebar-link" data-action="logout"><span class="sidebar-link-icon">🚪</span> Đăng Xuất</a>
      </div>
    </nav>
    <div class="sidebar-user">
      <img id="sidebar-user-avatar" src="" class="sidebar-user-avatar">
      <div><div class="sidebar-user-name" id="sidebar-user-name">—</div><div class="sidebar-user-role" id="sidebar-user-role">Bác sĩ / KTV</div></div>
    </div>
  </aside>

  <main class="main-content">
    <div class="topbar">
      <div style="font-size:14px;color:var(--text-secondary)">Bác Sĩ / Tổng Quan</div>
      <div class="topbar-actions">
        <span id="today-date" style="font-size:13px;color:var(--text-muted)"></span>
      </div>
    </div>

    <div class="page-container">
      <h1 class="page-title font-heading" id="greeting">Xin chào! 👋</h1>
      <p class="page-subtitle" id="specialty-tag"></p>

      <div class="grid-4" style="margin-bottom:28px">
        <div class="stat-card blue"><div class="stat-icon blue">📅</div><div><div class="stat-label">Hôm Nay</div><div class="stat-value" id="d-today">—</div></div></div>
        <div class="stat-card purple"><div class="stat-icon purple">⏳</div><div><div class="stat-label">Chờ Xác Nhận</div><div class="stat-value" id="d-pending">—</div></div></div>
        <div class="stat-card emerald"><div class="stat-icon emerald">✅</div><div><div class="stat-label">Đã Hoàn Thành</div><div class="stat-value" id="d-done">—</div></div></div>
        <div class="stat-card gold"><div class="stat-icon gold">⭐</div><div><div class="stat-label">Đánh Giá TB</div><div class="stat-value" id="d-rating">—</div></div></div>
      </div>

      <!-- Today's Schedule -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">Lịch Hẹn Hôm Nay</div>
          <a href="appointments.html" class="btn btn-ghost btn-sm">Xem tất cả →</a>
        </div>
        <div id="today-schedule">
          <div style="text-align:center;padding:32px;color:var(--text-muted)">Đang tải...</div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
Auth.requireLogin('doctor');
populateSidebarUser();
const user = Auth.getUser();
document.getElementById('greeting').textContent = `Xin chào, ${user.name}! 👋`;
document.getElementById('specialty-tag').textContent = user.specialty || 'Chuyên gia SpaProMax';
document.getElementById('today-date').textContent = new Date().toLocaleDateString('vi-VN', { weekday:'long', day:'2-digit', month:'2-digit' });

async function loadDoctorDashboard() {
  try {
    const today = new Date().toISOString().split('T')[0];

    // Lấy lịch hôm nay của bác sĩ
    const todayAppts = await API.getStaffAppts(user.id, { date: today }).catch(() => []);
    // Lấy tất cả lịch (bác sĩ chỉ thấy của mình)
    const allAppts  = await API.getAppointments().catch(() => []);

    animateCount(document.getElementById('d-today'), todayAppts.length);
    animateCount(document.getElementById('d-pending'), allAppts.filter(a => a.status === 'pending').length);
    animateCount(document.getElementById('d-done'), allAppts.filter(a => a.status === 'completed').length);

    // Rating từ reviews
    const reviews = await API.getReviews({ staffId: user.id }).catch(() => []);
    const avg = reviews.length
      ? (reviews.reduce((s, r) => s + r.rating, 0) / reviews.length).toFixed(1)
      : '—';
    document.getElementById('d-rating').textContent = avg !== '—' ? avg + ' ⭐' : '—';

    // Lịch hôm nay
    const sched = document.getElementById('today-schedule');
    if (!todayAppts.length) {
      sched.innerHTML = `<div style="text-align:center;padding:48px;color:var(--text-muted)"><div style="font-size:40px;margin-bottom:12px">🎉</div><div>Không có lịch hẹn nào hôm nay!</div></div>`;
      return;
    }
    sched.innerHTML = todayAppts.map(a => `
      <div style="display:flex;align-items:center;gap:16px;padding:16px;border-bottom:1px solid rgba(255,255,255,0.04)">
        <div style="text-align:center;min-width:50px">
          <div style="font-size:18px;font-weight:700;color:var(--purple-lighter)">${String(a.time||'').slice(0,5)}</div>
          <div style="font-size:10px;color:var(--text-muted)">${a.serviceDuration || 60} phút</div>
        </div>
        <img src="${a.customerImage || `https://ui-avatars.com/api/?name=${encodeURIComponent(a.customerName||'?')}&background=7C3AED&color=fff`}"
             style="width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid var(--border)"
             onerror="this.src='https://ui-avatars.com/api/?name=?&background=7C3AED&color=fff'">
        <div style="flex:1">
          <div style="font-weight:600;margin-bottom:2px">${a.customerName || 'Khách hàng'}</div>
          <div style="font-size:13px;color:var(--text-secondary)">${a.serviceIcon || '✨'} ${a.serviceName || ''}</div>
          ${a.note ? `<div style="font-size:12px;color:var(--text-muted);margin-top:2px">📝 ${a.note}</div>` : ''}
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          ${Fmt.statusBadge(a.status)}
          ${a.status === 'confirmed'   ? `<button class="btn btn-sm btn-primary" onclick="updateStatus('${a.id}','in-progress')">▶ Bắt Đầu</button>` : ''}
          ${a.status === 'in-progress' ? `<button class="btn btn-sm btn-success" onclick="updateStatus('${a.id}','completed')">✓ Hoàn Thành</button>` : ''}
          ${a.status === 'pending'     ? `<button class="btn btn-sm btn-outline" onclick="updateStatus('${a.id}','confirmed')">✓ Xác Nhận</button>` : ''}
        </div>
      </div>
    `).join('');
  } catch(e) {
    console.error('Doctor dashboard error:', e);
    Toast.error('Lỗi tải dữ liệu: ' + e.message);
  }
}

async function updateStatus(id, status) {
  try {
    await API.updateApptStatus(id, { status });
    Toast.success('Đã cập nhật trạng thái');
    loadDoctorDashboard();
  } catch(e) { Toast.error(e.message); }
}

loadDoctorDashboard();
</script>
</body>
</html>
