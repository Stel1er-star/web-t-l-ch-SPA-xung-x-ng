<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lịch Hẹn Của Tôi — SpaProMax</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>
<div id="toast-container"></div>

<!-- Cancel Modal -->
<div class="modal-overlay" id="cancel-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Hủy Lịch Hẹn</div>
      <button class="modal-close" onclick="document.getElementById('cancel-modal').classList.remove('open')">✕</button>
    </div>
    <div id="cancel-info" style="background:rgba(244,63,94,0.1);border:1px solid rgba(244,63,94,0.25);border-radius:12px;padding:14px;margin-bottom:16px;font-size:13px;color:var(--text-secondary)">
      Đang tải...
    </div>
    <div class="form-group">
      <label class="form-label">Lý do hủy</label>
      <textarea class="form-input form-textarea" id="cancel-reason" placeholder="Nhập lý do hủy lịch..." style="min-height:80px"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="document.getElementById('cancel-modal').classList.remove('open')">Giữ Lịch</button>
      <button class="btn btn-danger" id="confirm-cancel-btn">Xác Nhận Hủy</button>
    </div>
  </div>
</div>

<!-- Review Modal -->
<div class="modal-overlay" id="review-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Đánh Giá Dịch Vụ ⭐</div>
      <button class="modal-close" onclick="document.getElementById('review-modal').classList.remove('open')">✕</button>
    </div>
    <div class="form-group" style="margin-bottom:16px">
      <label class="form-label">Đánh giá của bạn</label>
      <div style="display:flex;gap:8px;font-size:32px" id="star-picker">
        <span class="star" data-val="1">☆</span>
        <span class="star" data-val="2">☆</span>
        <span class="star" data-val="3">☆</span>
        <span class="star" data-val="4">☆</span>
        <span class="star" data-val="5">☆</span>
      </div>
    </div>
    <div class="form-group" style="margin-bottom:16px">
      <label class="form-label">Nhận xét</label>
      <textarea class="form-input form-textarea" id="review-comment" placeholder="Chia sẻ trải nghiệm của bạn..." style="min-height:100px"></textarea>
    </div>
    <div class="form-group" style="margin-bottom:16px">
      <label class="form-label">Tags (phân cách bằng dấu phẩy)</label>
      <input type="text" class="form-input" id="review-tags" placeholder="Tận tâm, Chuyên nghiệp, Hiệu quả">
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="document.getElementById('review-modal').classList.remove('open')">Hủy</button>
      <button class="btn btn-primary" id="submit-review-btn">⭐ Gửi Đánh Giá</button>
    </div>
  </div>
</div>

<div class="main-layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="sidebar-logo-icon">🌿</div><span class="sidebar-logo-text">SpaProMax</span></div>
    <nav class="sidebar-nav">
      <div class="sidebar-section">
        <div class="sidebar-section-title">Của Tôi</div>
        <a href="dashboard.html" class="sidebar-link"><span class="sidebar-link-icon">🏠</span> Tổng Quan</a>
        <a href="booking.html" class="sidebar-link"><span class="sidebar-link-icon">🗓️</span> Đặt Lịch Mới</a>
        <a href="my-appointments.html" class="sidebar-link active"><span class="sidebar-link-icon">📋</span> Lịch Hẹn Của Tôi</a>
        <a href="profile.html" class="sidebar-link"><span class="sidebar-link-icon">👤</span> Hồ Sơ</a>
      </div>
      <div class="sidebar-section">
        <a href="../index.html" class="sidebar-link"><span class="sidebar-link-icon">🌐</span> Trang Chủ</a>
        <a class="sidebar-link" data-action="logout"><span class="sidebar-link-icon">🚪</span> Đăng Xuất</a>
      </div>
    </nav>
    <div class="sidebar-user">
      <img id="sidebar-user-avatar" src="" class="sidebar-user-avatar">
      <div><div class="sidebar-user-name" id="sidebar-user-name">—</div><div class="sidebar-user-role" id="sidebar-user-role">Khách hàng</div></div>
    </div>
  </aside>

  <main class="main-content">
    <div class="topbar">
      <div style="font-size:14px;color:var(--text-secondary)">Khách Hàng / Lịch Hẹn</div>
      <div class="topbar-actions">
        <a href="booking.html" class="btn btn-primary btn-sm">+ Đặt Lịch Mới</a>
      </div>
    </div>
    <div class="page-container">
      <h1 class="page-title font-heading">Lịch Hẹn Của Tôi</h1>

      <!-- Filter tabs -->
      <div style="display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap">
        <button class="filter-tab active" data-status="">Tất Cả</button>
        <button class="filter-tab" data-status="pending">⏳ Chờ Xác Nhận</button>
        <button class="filter-tab" data-status="confirmed">✅ Đã Xác Nhận</button>
        <button class="filter-tab" data-status="in-progress">🔄 Đang Khám</button>
        <button class="filter-tab" data-status="completed">🎉 Hoàn Thành</button>
        <button class="filter-tab" data-status="cancelled">❌ Đã Hủy</button>
      </div>

      <div id="appts-list"></div>
    </div>
  </main>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
Auth.requireLogin('customer');
populateSidebarUser();

let allAppts = [], currentFilter = '';
let cancelTarget = null, reviewTarget = null, selectedRating = 0;

// Filter tabs
document.querySelectorAll('.filter-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentFilter = tab.dataset.status;
    renderAppts();
  });
});

function renderAppts() {
  const filtered = currentFilter ? allAppts.filter(a => a.status === currentFilter) : allAppts;
  const el = document.getElementById('appts-list');
  if (!filtered.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-title">Không có lịch hẹn</div><div class="empty-state-desc">Bạn chưa có lịch hẹn nào trong danh mục này</div><a href="booking.html" class="btn btn-primary" style="margin-top:12px">Đặt Lịch Ngay</a></div>`;
    return;
  }
  el.innerHTML = filtered.map(a => `
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
        <img src="${a.staffImage || `https://ui-avatars.com/api/?name=${encodeURIComponent(a.staffName)}&background=7C3AED&color=fff`}"
             style="width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid var(--border);flex-shrink:0"
             onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(a.staffName)}&background=7C3AED&color=fff'">
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px">
            <span style="font-size:18px">${a.serviceIcon}</span>
            <span style="font-weight:700;font-size:16px">${a.serviceName}</span>
            ${Fmt.statusBadge(a.status)}
            ${Fmt.categoryBadge(a.serviceCategory)}
          </div>
          <div style="font-size:13px;color:var(--text-secondary);margin-bottom:4px">
            👨‍⚕️ ${a.staffName} ${a.staffSpecialty ? `(${a.staffSpecialty})` : ''}
          </div>
          <div style="display:flex;gap:16px;font-size:13px;color:var(--text-muted);flex-wrap:wrap">
            <span>📅 ${Fmt.date(a.date)}</span>
            <span>🕐 ${a.time}</span>
            <span>⏱ ${a.serviceDuration} phút</span>
            <span style="color:var(--gold);font-weight:600">💰 ${Fmt.currency(a.price)}</span>
            ${a.depositPaid ? `<span style="color:var(--emerald)">✅ Đã đặt cọc</span>` : ''}
          </div>
          ${a.note ? `<div style="margin-top:6px;font-size:12px;color:var(--text-muted);background:rgba(255,255,255,0.03);padding:8px 10px;border-radius:8px">📝 ${a.note}</div>` : ''}
          ${a.medicalNote ? `<div style="margin-top:6px;font-size:12px;color:var(--teal-light);background:rgba(6,182,212,0.08);padding:8px 10px;border-radius:8px;border-left:3px solid var(--teal)">🩺 <b>Kết quả:</b> ${a.medicalNote}</div>` : ''}
          ${a.cancel_reason ? `<div style="margin-top:6px;font-size:12px;color:var(--rose-light);background:rgba(244,63,94,0.08);padding:8px 10px;border-radius:8px">❌ Lý do hủy: ${a.cancel_reason}</div>` : ''}
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;flex-shrink:0">
          ${['pending','confirmed'].includes(a.status) ? `<button class="btn btn-danger btn-sm" onclick="openCancelModal('${a.id}', '${a.date}', '${a.time}', ${a.depositPaid})">Hủy Lịch</button>` : ''}
          ${a.status === 'completed' && !a.reviewId ? `<button class="btn btn-primary btn-sm" onclick="openReviewModal('${a.id}', '${a.staffId}', '${a.serviceId}')">⭐ Đánh Giá</button>` : ''}
          ${a.reviewId ? `<span style="font-size:12px;color:var(--emerald);font-weight:600">✅ Đã đánh giá</span>` : ''}
        </div>
      </div>
    </div>
  `).join('');
}

async function loadAppts() {
  document.getElementById('appts-list').innerHTML = `<div style="text-align:center;padding:48px;color:var(--text-muted)">Đang tải...</div>`;
  try {
    allAppts = await API.getMyAppts();
    renderAppts();
  } catch { Toast.error('Lỗi tải dữ liệu'); }
}

// Cancel modal
function openCancelModal(id, date, time, depositPaid) {
  cancelTarget = id;
  const canRefund = (new Date(`${date}T${time}:00`) - new Date()) / 3600000 > 24;
  document.getElementById('cancel-info').innerHTML = depositPaid
    ? (canRefund
      ? `<span style="color:var(--emerald)">✅ Bạn sẽ được hoàn tiền đặt cọc vì hủy trước 24 giờ.</span>`
      : `<span style="color:var(--rose-light)">⚠️ Hủy trong vòng 24 giờ — bạn sẽ mất tiền đặt cọc.</span>`)
    : `<span style="color:var(--text-secondary)">Bạn chưa đặt cọc cho lịch này.</span>`;
  document.getElementById('cancel-modal').classList.add('open');
}

document.getElementById('confirm-cancel-btn').addEventListener('click', async () => {
  try {
    await API.updateApptStatus(cancelTarget, { status: 'cancelled', cancel_reason: document.getElementById('cancel-reason').value });
    document.getElementById('cancel-modal').classList.remove('open');
    Toast.success('Đã hủy lịch hẹn');
    loadAppts();
  } catch(e) { Toast.error(e.message); }
});

// Review modal
function openReviewModal(apptId, staffId, serviceId) {
  reviewTarget = { apptId, staffId, serviceId };
  selectedRating = 0;
  document.getElementById('review-comment').value = '';
  document.getElementById('review-tags').value = '';
  updateStars(0);
  document.getElementById('review-modal').classList.add('open');
}

function updateStars(n) {
  selectedRating = n;
  document.querySelectorAll('#star-picker .star').forEach((s,i) => {
    s.textContent = i < n ? '★' : '☆';
    s.style.color  = i < n ? 'var(--gold)' : 'var(--text-muted)';
  });
}
document.querySelectorAll('#star-picker .star').forEach(s => {
  s.addEventListener('click', () => updateStars(parseInt(s.dataset.val)));
  s.style.cursor = 'pointer'; s.style.fontSize = '32px';
});

document.getElementById('submit-review-btn').addEventListener('click', async () => {
  if (!selectedRating) { Toast.warning('Vui lòng chọn số sao!'); return; }
  try {
    await API.createReview({
      appointmentId: reviewTarget.apptId,
      rating: selectedRating,
      comment: document.getElementById('review-comment').value,
      tags: document.getElementById('review-tags').value,
    });
    document.getElementById('review-modal').classList.remove('open');
    Toast.success('Cảm ơn bạn đã đánh giá! ⭐');
    loadAppts();
  } catch(e) { Toast.error(e.message); }
});

loadAppts();
</script>
</body>
</html>
